---
- name: Deploy Study-SMart application
  hosts: app_servers
  become: yes
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Create application directory
      file:
        path: /opt/studysmart
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
    - name: Copy docker-compose file
      copy:
        src: ../../docker-compose.yml
        dest: /opt/studysmart/docker-compose.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
    - name: Copy environment file
      copy:
        src: ../../.env.production
        dest: /opt/studysmart/.env
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: '0755'
    - name: Copy Docker Compose binary from host
      ansible.builtin.copy:
        src: /usr/local/lib/docker/cli-plugins/docker-compose
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: '0755'
    - name: Verify docker compose works
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false
      ignore_errors: yes
    - name: Show compose version
      debug:
        msg: "{{ compose_version.stdout | default('docker compose not available') }}"
    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: /opt/studysmart
      register: pull_output
      changed_when: "'Pulled' in pull_output.stderr or 'Downloaded' in pull_output.stderr"
      ignore_errors: yes
    - name: Start containers
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans --force-recreate
        chdir: /opt/studysmart
      register: compose_output
      changed_when: "'Started' in compose_output.stderr or 'Recreated' in compose_output.stderr"
      ignore_errors: yes
    - name: Wait for containers to be healthy
      ansible.builtin.pause:
        seconds: 10
    - name: Check if containers are running
      ansible.builtin.shell: docker ps 2>/dev/null || echo "docker not running"
      register: container_status
      changed_when: false
      ignore_errors: yes
    - name: Display container status
      debug:
        msg: "{{ container_status.stdout_lines | default(['no output']) }}"
