---
- name: Setup monitoring stack
  hosts: monitoring_hosts,app_servers
  become: yes
  vars:
    node_exporter_version: "1.7.0"
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml
  roles:
    - role: monitoring
      vars:
        prometheus_version: "2.47.0"
        grafana_version: "10.2.0"
        alertmanager_version: "0.25.0"
    
  tasks:
    - name: Create monitoring directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/monitoring/prometheus
        - /opt/monitoring/grafana
        - /opt/monitoring/alertmanager
        - /opt/monitoring/node-exporter
    
    - name: Copy Prometheus configuration
      template:
        src: ../templates/prometheus.yml.j2
        dest: /opt/monitoring/prometheus/prometheus.yml
      notify: restart prometheus
    
    - name: Copy Alertmanager configuration
      template:
        src: ../templates/alertmanager.yml.j2
        dest: /opt/monitoring/alertmanager/alertmanager.yml
      notify: restart alertmanager
    
    - name: Start monitoring stack with docker-compose
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /opt/monitoring
      ignore_errors: yes
      when: ansible_virtualization_type == "docker"
  handlers:
    - name: restart prometheus
      ansible.builtin.shell: docker restart prometheus
      ignore_errors: yes
    - name: restart alertmanager
      ansible.builtin.shell: docker restart alertmanager
      ignore_errors: yes
