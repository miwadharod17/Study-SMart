version: '3.9'

services:
  # ... (your existing services: postgres, redis, pgadmin, redis-commander, prometheus, grafana)

  # ── Backend Microservices ────────────────────────────────────────────────
  payment-service:
    build: ./backend/services/payment-service
    container_name: studysmart_payment
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_USER: studysmart
      DB_PASSWORD: studysmart
      DB_NAME: studysmart_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studysmart_network

  forum-service:
    build: ./backend/services/forum-service
    container_name: studysmart_forum
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_USER: studysmart
      DB_PASSWORD: studysmart
      DB_NAME: studysmart_db
      REDIS_HOST: redis
    ports:
      - '3002:3002'
    depends_on:
      - postgres
      - redis
    networks:
      - studysmart_network

  crud-service:
    build: ./backend/services/crud-service
    container_name: studysmart_crud
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: postgres
      DB_USER: studysmart
      DB_PASSWORD: studysmart
      DB_NAME: studysmart_db
      REDIS_HOST: redis
    ports:
      - '3003:3003'
    depends_on:
      - postgres
      - redis
    networks:
      - studysmart_network

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: studysmart_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - payment-service
      - forum-service
      - crud-service
    networks:
      - studysmart_network

  # ── Nginx API Gateway ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: studysmart_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - payment-service
      - forum-service
      - crud-service
      - frontend
    networks:
      - studysmart_network
    profiles:
      - gateway

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  studysmart_network:
    name: studysmart_network
    driver: bridge
