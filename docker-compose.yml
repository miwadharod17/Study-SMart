services:
  postgres:
    build: ./backend/database
    container_name: studysmart_postgres
    environment:
      POSTGRES_USER: studysmart
      POSTGRES_PASSWORD: studysmart
      POSTGRES_DB: studysmart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - studysmart_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studysmart -d studysmart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: studysmart_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - studysmart_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ── Backend Microservices ────────────────────────────────────────────────
  payment-service:
    build: ./backend/services/payment-service
    container_name: studysmart_payment
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_USER: studysmart
      DB_PASSWORD: studysmart
      DB_NAME: studysmart_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: studysmart_jwt_secret_key_2024
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studysmart_network

  forum-service:
    build: ./backend/services/forum-service
    container_name: studysmart_forum
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_USER: studysmart
      DB_PASSWORD: studysmart
      DB_NAME: studysmart_db
      REDIS_HOST: redis
      JWT_SECRET: studysmart_jwt_secret_key_2024
    ports:
      - '3002:3002'
    depends_on:
      - postgres
      - redis
    networks:
      - studysmart_network

  crud-service:
    build: ./backend/services/crud-service
    container_name: studysmart_crud
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: postgres
      DB_USER: studysmart
      DB_PASSWORD: studysmart
      DB_NAME: studysmart_db
      REDIS_HOST: redis
      JWT_SECRET: studysmart_jwt_secret_key_2024
    ports:
      - '3003:3003'
    depends_on:
      - postgres
      - redis
    networks:
      - studysmart_network

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: studysmart_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - payment-service
      - forum-service
      - crud-service
    networks:
      - studysmart_network

  # ── Nginx API Gateway ─────────────────────────────────────────────────────
  nginx:
    build: ./backend/api-gateway
    container_name: studysmart_nginx
    restart: unless-stopped
    ports:
      - '8080:8080'
      - '80:80'
    depends_on:
      - payment-service
      - forum-service
      - crud-service
      - frontend
    networks:
      - studysmart_network
    profiles:
      - gateway

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  studysmart_network:
    name: studysmart_network
    driver: bridge
