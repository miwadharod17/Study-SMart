sonar.projectKey=frontend
sonar.projectName=Frontend Application
sonar.projectVersion=1.0.0
sonar.description=React frontend application

sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,tests/**,coverage/**,public/**
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js,tests/**/*.test.jsx,tests/**/*.spec.js,tests/**/*.spec.jsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/node_modules/**,tests/**,public/**
