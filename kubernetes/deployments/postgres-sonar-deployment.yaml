apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-sonar
  namespace: study-smart
  labels:
    app: postgres-sonar
    tier: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-sonar
  template:
    metadata:
      labels:
        app: postgres-sonar
        tier: database
    spec:
      containers:
      - name: postgres-sonar
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: sonar
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: sonarqube-db-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sonarqube-db-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U sonar
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U sonar
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-sonar-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-sonar
  namespace: study-smart
  labels:
    app: postgres-sonar
spec:
  type: ClusterIP
  selector:
    app: postgres-sonar
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
