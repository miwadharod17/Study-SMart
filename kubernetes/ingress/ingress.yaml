apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: study-smart-ingress
  namespace: study-smart
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx

  rules:
  - host: api.studysmart.com
    http:
      paths:
      - path: /api/payments
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 3001

      - path: /api/forum
        pathType: Prefix
        backend:
          service:
            name: forum-service
            port:
              number: 3002

      - path: /api/crud
        pathType: Prefix
        backend:
          service:
            name: crud-service
            port:
              number: 3003

  - host: studysmart.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80