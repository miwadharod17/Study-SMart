global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: study-smart

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alerts.yml"
  - "sonarqube-alerts.yml"
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'payment-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['payment-service:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+).*'
        replacement: '${1}'

  - job_name: 'forum-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['forum-service:3002']

  - job_name: 'crud-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['crud-service:3003']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'sonarqube'
    metrics_path: '/api/system/metrics'
    static_configs:
      - targets: ['sonarqube:9000']
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sonarqube'
