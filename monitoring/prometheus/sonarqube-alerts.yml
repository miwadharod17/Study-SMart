groups:
  - name: sonarqube-alerts
    interval: 30s
    rules:
      - alert: SonarQubeDown
        expr: up{job="sonarqube"} == 0
        for: 5m
        labels:
          severity: critical
          service: sonarqube
        annotations:
          summary: "SonarQube is down"
          description: "SonarQube service is not responding"

      - alert: QualityGateFailure
        expr: sonarqube_projects_qgate_failures_total > 0
        for: 5m
        labels:
          severity: warning
          service: sonarqube
        annotations:
          summary: "Quality Gate failures detected"
          description: "Projects have failed quality gates: {{ $value }} failures"

      - alert: HighDuplication
        expr: sonarqube_duplicated_lines_density > 10
        for: 10m
        labels:
          severity: warning
          service: sonarqube
        annotations:
          summary: "High code duplication detected"
          description: "Code duplication is {{ $value }}%"

      - alert: LowTestCoverage
        expr: sonarqube_lines_test_coverage < 80
        for: 10m
        labels:
          severity: warning
          service: sonarqube
        annotations:
          summary: "Low test coverage detected"
          description: "Test coverage is {{ $value }}%"

      - alert: SecurityHotspots
        expr: sonarqube_security_hotspots_to_review > 0
        for: 5m
        labels:
          severity: critical
          service: sonarqube
        annotations:
          summary: "Security hotspots require review"
          description: "{{ $value }} security hotspots to review"
