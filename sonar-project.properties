sonar.projectKey=study-smart-main
sonar.projectName=Study-Smart
sonar.projectVersion=1.0.0
sonar.description=Study-Smart - Educational Learning Platform

# Paths to analyze
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,.git/**,tests/**,coverage/**,**/*.min.js

# Test and coverage
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js,tests/**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Code coverage
sonar.coverage.exclusions=**/node_modules/**,tests/**,**/dist/**,**/build/**

# Duplications
sonar.cpd.exclusions=**/node_modules/**,tests/**

# Quality profiles
sonar.qualityProfile=Sonar%20way

# Server settings
sonar.core.codeCoveragePlugin=jacoco
